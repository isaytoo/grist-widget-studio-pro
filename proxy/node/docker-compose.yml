version: '3.8'

services:
  proxy:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Uncomment and set your token to enable auth
      # - PROXY_TOKEN=your-secret-token-here
      # - ALLOWED_HOSTS=api.example.com,api2.example.com
      # - BLOCKED_HOSTS=evil.com
      - NODE_ENV=production
    restart: unless-stopped
